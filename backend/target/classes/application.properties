spring.application.name=library-backend

# --- Base de donnees MariaDB (via variables d'environnement Docker) ---
spring.datasource.url=jdbc:mariadb://${MARIADB_HOST:database}:${MARIADB_PORT:3306}/${MARIADB_DATABASE:library_db}
spring.datasource.username=${MARIADB_USER:library_user}
spring.datasource.password=${MARIADB_PASSWORD:library_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true

server.port=8080

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html