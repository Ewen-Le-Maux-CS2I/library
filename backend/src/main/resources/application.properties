spring.application.name=library-backend

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Les valeurs sont injectées depuis les variables d'environnement Docker Compose
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:librarydb}
spring.datasource.username=${DB_USER:library}
spring.datasource.password=${DB_PASSWORD:library}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Serialisation JSON ────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
