<div class="container mx-auto p-6 max-w-7xl grid grid-cols-1 lg:grid-cols-3 gap-8">
  
  <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm h-fit">
    <h3 class="text-lg font-bold text-gray-900 mb-4">Nouvel Emprunt</h3>
    
    <form [formGroup]="empruntForm" (ngSubmit)="soumettreEmprunt()" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">ID Adhérent</label>
        <input type="number" formControlName="idAdherent" 
               class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2.5 bg-gray-50 border">
      </div>
      
      <div>
        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">ID Exemplaire</label>
        <input type="number" formControlName="idExemplaire" 
               class="w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2.5 bg-gray-50 border">
      </div>
      
      <button type="submit" [disabled]="empruntForm.invalid"
              class="w-full bg-blue-600 text-white font-medium py-2.5 px-4 rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm mt-2">
        Valider l'emprunt
      </button>
    </form>
  </div>

  <div class="lg:col-span-2 bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-200">
      <h3 class="text-lg font-bold text-gray-900">Emprunts En Cours</h3>
    </div>
    
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-gray-500">
        <thead class="bg-gray-50 text-xs text-gray-700 uppercase tracking-wider border-b border-gray-200">
          <tr>
            <th class="px-6 py-3 font-semibold">Adhérent</th>
            <th class="px-6 py-3 font-semibold">Ouvrage</th>
            <th class="px-6 py-3 font-semibold">Code Barre</th>
            <th class="px-6 py-3 font-semibold">Retour Prévu</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          @for (emp of emprunts; track emp.id) {
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 font-medium text-gray-900">✨ ID #{{ emp.idAdherent }}</td>
              <td class="px-6 py-4 text-gray-700 font-medium">{{ emp.exemplaire.ouvrage.titre }}</td>
              <td class="px-6 py-4"><span class="font-mono bg-gray-100 px-1.5 py-0.5 rounded text-xs text-gray-600">{{ emp.exemplaire.codeBarre }}</span></td>
              <td class="px-6 py-4 text-sm text-amber-600 font-medium">{{ emp.dateRetourPrevue | date:'dd/MM/yyyy' }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="text-center py-8 text-gray-400">Aucun emprunt actif enregistré.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

</div>
