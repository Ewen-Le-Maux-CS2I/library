name : Spring
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Linter (Spotless Modern Formatter)
        run: |
          mvn spotless:apply
          mvn spotless:check

      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend
          scanners: vuln
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Build and Run Tests (TDD)
        run: mvn clean verify
